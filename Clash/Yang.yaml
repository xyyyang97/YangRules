mode: rule
log-level: info
ipv6: true
allow-lan: false
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

proxies: []
proxy-providers: {}

proxy-groups:
  - name: 🚀 Proxy
    type: select
    include-all: true
    proxies:
      - DIRECT

  - name: 🤖 AI
    type: select
    proxies:
      - 🚀 Proxy
      - 🎯 Direct
      - 🛑 Reject

  - name: 🍎 Apple
    type: select
    proxies:
      - 🎯 Direct
      - 🚀 Proxy
      - 🛑 Reject

  - name: 💻 Microsoft
    type: select
    proxies:
      - 🚀 Proxy
      - 🎯 Direct
      - 🛑 Reject

  - name: 🧑‍💻 Dev
    type: select
    proxies:
      - 🚀 Proxy
      - 🎯 Direct
      - 🛑 Reject

  - name: 🎬 Media
    type: select
    proxies:
      - 🚀 Proxy
      - 🎯 Direct
      - 🛑 Reject

  - name: 🎯 Direct
    type: select
    proxies:
      - DIRECT
      - 🚀 Proxy

  - name: 🛑 Reject
    type: select
    proxies:
      - REJECT

