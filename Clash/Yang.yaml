dns:
  enable: true
  ipv6: true
  prefer-h3: true
  enhanced-mode: fake-ip
  respect-rules: true
  use-hosts: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost.ptlogin2.qq.com
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"

rules:
  - DOMAIN-SUFFIX,smoot.apple.com,🚀 Proxy
  - DOMAIN-SUFFIX,guzzoni.apple.com,🚀 Proxy
  - DOMAIN-SUFFIX,genmoji.apple.com,🚀 Proxy
  - DOMAIN-SUFFIX,siri.apple.com,🚀 Proxy
  - DOMAIN-SUFFIX,apple-relay.apple.com,🚀 Proxy
  - DOMAIN-SUFFIX,apple-relay.cloudflare.com,🚀 Proxy
  - DOMAIN-SUFFIX,mask-api.icloud.com,🚀 Proxy
  - DOMAIN-SUFFIX,gateway.icloud.com,🚀 Proxy
  - DOMAIN-SUFFIX,metrics.icloud.com,🚀 Proxy
  - RULE-SET,apple-intelligence,🤖 AI
  - RULE-SET,siri,🤖 AI
  - RULE-SET,openai,🤖 AI
  - RULE-SET,anthropic,🤖 AI
  - RULE-SET,gemini,🤖 AI
  - RULE-SET,bing,🤖 AI
  - RULE-SET,github-copilot,🤖 AI
  - RULE-SET,apple,🍎 Apple
  - RULE-SET,microsoft,💻 Microsoft
  - RULE-SET,github,🧑‍💻 Dev
  - RULE-SET,telegram,🎬 Media
  - RULE-SET,youtube,🎬 Media
  - RULE-SET,netflix,🎬 Media
  - RULE-SET,disney,🎬 Media
  - RULE-SET,china-max,🎯 Direct
  - GEOSITE,CN,🎯 Direct
  - GEOIP,CN,🎯 Direct,no-resolve
  - MATCH,🚀 Proxy
